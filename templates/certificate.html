<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate of Completion | S&U</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --neon-mint: #00ffc8; 
            --gold-accent: #ffd700;
            --bg-dark-green: radial-gradient(circle at center, #05220e 0%, #010a05 100%);
        }

        body {
            background: #010a05 !important;
            background-image: var(--bg-dark-green) !important;
            background-attachment: fixed;
            color: white !important;
            font-family: 'Segoe UI', sans-serif !important;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* ЭФФЕКТ СЕРТИФИКАТА */
        .certificate-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 2px solid var(--gold-accent); /* Золотая рамка */
            border-radius: 30px;
            padding: 60px;
            max-width: 800px;
            width: 90%;
            text-align: center;
            position: relative;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.2);
            overflow: hidden;
        }

        /* Декоративные элементы по углам */
        .corner {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 4px solid var(--gold-accent);
            opacity: 0.5;
        }
        .top-left { top: 20px; left: 20px; border-right: none; border-bottom: none; }
        .bottom-right { bottom: 20px; right: 20px; border-left: none; border-top: none; }

        .medal-icon {
            font-size: 5rem;
            color: var(--gold-accent);
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            margin-bottom: 20px;
        }

        h1 {
            color: var(--neon-mint);
            font-size: 3rem;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .cert-text {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
        }

        .user-name {
            font-size: 2.5rem;
            font-weight: 800;
            color: white;
            border-bottom: 2px solid var(--neon-mint);
            display: inline-block;
            margin-bottom: 20px;
            padding: 0 20px;
        }

        .course-name {
            color: var(--gold-accent);
            font-weight: bold;
            font-size: 1.5rem;
        }

        /* СПИСОК ДОСТИЖЕНИЙ */
        .badges {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 40px 0;
        }

        .badge {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .badge i {
            display: block;
            font-size: 1.5rem;
            color: var(--neon-mint);
            margin-bottom: 5px;
        }

        .back-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 40px;
            background: transparent;
            border: 1px solid var(--neon-mint);
            color: var(--neon-mint);
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: var(--neon-mint);
            color: black;
            box-shadow: 0 0 20px var(--neon-mint);
        }

        .animate-zoom {
            animation: zoomIn 1s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="certificate-container animate-zoom">
        <div class="corner top-left"></div>
        <div class="corner bottom-right"></div>

        <div class="medal-icon">
            <i class="fa-solid fa-award"></i>
        </div>

        <h1>Certificate</h1>
        <p class="cert-text">This is to certify that</p>
        
        <div class="user-name">FUTURE FOUNDER</div>
        
        <p class="cert-text">has successfully completed the intensive course</p>
        <div class="course-name">STARTUP & UNLOCK ACADEMY</div>

        <div class="badges">
            <div class="badge"><i class="fa-solid fa-check-double"></i> Problem defined</div>
            <div class="badge"><i class="fa-solid fa-users-viewfinder"></i> Market analyzed</div>
            <div class="badge"><i class="fa-solid fa-chart-line"></i> Business plan ready</div>
        </div>

        <p style="color: rgba(255,255,255,0.4); font-size: 0.8rem;">ID: SU-2024-GLOBAL</p>

        <a href="{{ url_for('curriculum') }}" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i> Return to Academy
        </a>
    </div>

</body>
</html>
