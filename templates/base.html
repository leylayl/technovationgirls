<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S&U Ecosystem</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="investor-screen">

    <aside class="side-navigation">
        <div class="nav-top">
            <a href="{{ url_for('role_page') }}" class="nav-btn"><i class="fa-solid fa-house"></i></a>
            <a href="{{ url_for('settings') }}" class="nav-btn"><i class="fa-solid fa-sliders"></i></a>
            <a href="{{ url_for('notifications') }}" class="nav-btn"><i class="fa-solid fa-bell"></i></a>
        </div>
        <div class="nav-bottom">
            <a href="{{ url_for('support') }}" class="nav-btn"><i class="fa-solid fa-headset"></i></a>
            <button class="nav-btn user-avatar-btn">
                <img src="https://ui-avatars.com/api/?name={{ session.get('user_name') }}&background=0cb974&color=fff" alt="User">
            </button>
        </div>
    </aside>

    <div class="brand-header-center">
        <div class="brand-logo">S&U</div>
    </div>

    <div class="top-user-bar">
        <div class="user-info">
            <i class="fa-solid fa-user-astronaut"></i>
            <span>{{ session.get('user_name', 'Guest') }}</span>
        </div>
        <a href="{{ url_for('logout') }}" class="logout-link">
            <i class="fa-solid fa-right-from-bracket"></i> Exit
        </a>
    </div>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <div class="status-bar-fixed">
        <div class="status-item">
            <span class="dot"></span> 
            <span class="label">LANGUAGE:</span> 
            <span class="value">ENGLISH</span>
        </div>
        <div class="status-separator"></div>
        <div class="status-item">
            <span class="label">STATUS:</span> 
            <span class="value">ENCRYPTED</span>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
