<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S&U - Verification</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="brand-logo">S&U</div>

    <div class="container">
        <div class="glass-card">
            <h1>Verify Account</h1>
            <p class="subtitle">Enter the code sent to your email</p>
            
            <form action="/role" method="GET">
                <input type="text" class="input-field" placeholder="XXXXXX" maxlength="6" style="text-align: center; letter-spacing: 5px;" required>
                
                <button type="submit" class="btn-main">Verify</button>
            </form>

            <div style="margin-top: 20px;">
                <a href="/login" class="btn-back" style="color: rgb(131, 143, 137); text-decoration: none; font-size: 13px;">Back to login</a>
            </div>
        </div>
    </div>
</body>
</html>
