<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S&U | Interactive Marketplace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --neon-mint: #00ffc8; 
            --gold-accent: #ffd700;
            --bg-dark-green: radial-gradient(circle at center, #05220e 0%, #010a05 100%);
        }

        body.investor-screen {
            background: #010a05 !important;
            background-image: var(--bg-dark-green) !important;
            background-attachment: fixed;
            color: white !important;
            font-family: 'Segoe UI', sans-serif !important;
            margin: 0;
        }

        .top-user-bar { display: flex; justify-content: space-between; padding: 15px 40px; background: rgba(0, 0, 0, 0.3); }
        .user-info { color: var(--neon-mint); font-weight: bold; }
        .logout-link { color: rgba(255,255,255,0.5); text-decoration: none; }

        .app-header-center { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 1px solid rgba(0, 255, 200, 0.1); }
        .brand-logo-glowing { font-weight: 900; letter-spacing: 5px; text-shadow: 0 0 15px white; font-size: 1.5rem; }
        .btn-back-block { color: white; text-decoration: none; background: rgba(255,255,255,0.05); padding: 8px 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); font-size: 0.8rem; }

        .centered-content { max-width: 1100px; margin: 0 auto; padding: 40px 20px; text-align: center; }
        .title-gradient { color: var(--neon-mint) !important; text-shadow: 0 0 20px rgba(0, 255, 200, 0.4); font-size: 2.5rem; text-transform: uppercase; }
        
        /* SEARCH */
        .search-box { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 255, 200, 0.2); border-radius: 50px; padding: 15px 30px; display: flex; align-items: center; gap: 15px; max-width: 600px; margin: 40px auto; backdrop-filter: blur(10px); }
        .search-box input { background: none; border: none; color: white; width: 100%; font-size: 1.1rem; outline: none; }
        .search-box i { color: var(--neon-mint); }

        /* GRID */
        .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 50px; }
        .project-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 20px; text-align: left; transition: 0.3s; backdrop-filter: blur(10px); }
        .project-card:hover { border-color: var(--neon-mint); transform: translateY(-5px); }
        .project-card h3 { margin: 10px 0; font-size: 1.2rem; }

        /* DETAILS CARD */
        .details-container { display: none; margin-top: 50px; } /* Скрыта пока не выбран проект */
        .startup-card { background: rgba(255, 255, 255, 0.02); border: 1px solid var(--gold-accent); border-radius: 25px; padding: 40px; box-shadow: 0 0 30px rgba(255, 215, 0, 0.1); }
        
        .info-row { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; display: flex; align-items: center; gap: 15px; margin-bottom: 20px; text-align: left; }
        .info-row i { color: var(--gold-accent); font-size: 1.2rem; width: 20px; }
        .info-row span { color: white; font-size: 1.1rem; }

        .btn-main-neon { background: var(--neon-mint); color: black; border: none; padding: 15px 30px; border-radius: 10px; font-weight: 800; cursor: pointer; transition: 0.3s; text-decoration: none; display: inline-block; width: 100%; box-sizing: border-box; }
        .btn-main-neon:hover { box-shadow: 0 0 20px var(--neon-mint); transform: scale(1.02); }
        
        .btn-view { background: rgba(0, 255, 200, 0.1); color: var(--neon-mint); border: 1px solid var(--neon-mint); padding: 8px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }

        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="investor-screen">

    <div class="screen-wrapper">
        <div class="top-user-bar">
            <div class="user-info"><i class="fa-solid fa-user-astronaut"></i> <span>{{ session.get('user_name', 'Guest') }}</span></div>
            <a href="{{ url_for('logout') }}" class="logout-link"><i class="fa-solid fa-right-from-bracket"></i> Exit</a>
        </div>

        <header class="app-header-center">
            <a href="{{ url_for('dashboard_investor') }}" class="btn-back-block"><i class="fa-solid fa-arrow-left"></i> BACK</a>
            <div class="brand-logo-glowing">S&U</div>
            <div style="width: 60px;"></div>
        </header>

        <main class="centered-content">
            <h1 class="title-gradient">Marketplace</h1>
            
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="projectSearch" placeholder="Type to search startups...">
            </div>

            <div id="searchResults" class="projects-grid"></div>

            <div id="detailsBlock" class="details-container animate-fade-in">
                <div class="startup-card">
                    <h2 class="title-gradient" style="font-size: 1.8rem; margin-bottom: 30px;">Project Overview</h2>
                    
                    <div class="info-row">
                        <i class="fa-solid fa-rocket"></i>
                        <span id="detName">EcoEnergy Startup</span>
                    </div>
                    
                    <div class="info-row">
                        <i class="fa-solid fa-align-left"></i>
                        <span id="detDesc">Select a project to see the description.</span>
                    </div>

                    <div class="info-row">
                        <i class="fa-solid fa-user-tie"></i>
                        <span id="detFounder">Founder Name</span>
                    </div>

                    <button class="btn-main-neon" onclick="contactFounder()">
                        <i class="fa-solid fa-envelope"></i> CONTACT FOUNDER
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
    // Поиск
    document.getElementById('projectSearch').addEventListener('input', function(e) {
        let query = e.target.value;
        const container = document.getElementById('searchResults');
        if (query.length > 0) {
            fetch(`/api/search_projects?q=${query}`)
                .then(res => res.json())
                .then(data => {
                    container.innerHTML = '';
                    data.forEach(p => {
                        container.innerHTML += `
                            <div class="project-card animate-fade-in">
                                <h3>${p.name}</h3>
                                <p style="color:rgba(255,255,255,0.5)">${p.category || 'Startup'}</p>
                                <button class="btn-view" onclick="showDetails('${p.name}', '${p.description || 'No description provided.'}', '${p.founder || 'Unknown'}')">
                                    VIEW DETAILS
                                </button>
                            </div>
                        `;
                    });
                });
        } else { container.innerHTML = ''; }
    });

    // Функция обновления нижнего блока
    function showDetails(name, desc, founder) {
        document.getElementById('detailsBlock').style.display = 'block';
        document.getElementById('detName').innerText = name;
        document.getElementById('detDesc').innerText = desc;
        document.getElementById('detFounder').innerText = "Founder: " + founder;
        
        // Плавный скролл к деталям
        window.scrollTo({ top: document.getElementById('detailsBlock').offsetTop - 50, behavior: 'smooth' });
    }

    function contactFounder() {
        const name = document.getElementById('detName').innerText;
        alert("Request sent to the founder of " + name + "! They will contact you soon.");
    }
    </script>
</body>
</html>
