<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S&U - Choose Role</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="role-screen">

    <div class="top-user-bar">
        <div class="user-info">
            <i class="fa-solid fa-user-astronaut"></i>
            <span>{{ session.get('user_name', 'Leyla') }}</span>
        </div>
        
        <a href="{{ url_for('logout') }}" class="logout-link">
            <i class="fa-solid fa-right-from-bracket"></i> Exit
        </a>
    </div>

    <aside class="side-navigation">
        <div class="nav-top">
            <a href="{{ url_for('role_page') }}" class="nav-btn active" title="Home">
                <i class="fa-solid fa-house"></i>
            </a>
            <a href="{{ url_for('settings') }}" class="nav-btn" title="Settings">
                <i class="fa-solid fa-sliders"></i>
            </a>
            <a href="{{ url_for('notifications') }}" class="nav-btn" title="Notifications">
                <i class="fa-solid fa-bell"></i>
            </a>
        </div>

        <div class="nav-bottom">
            <a href="{{ url_for('support') }}" class="nav-btn" title="Support">
                <i class="fa-solid fa-headset"></i>
            </a>
            
            <div class="system-indicator">
                <div class="dot-active"></div>
            </div>
            
            <button class="nav-btn ghost-mode">
                <i class="fa-solid fa-ghost"></i>
            </button>
        </div>
    </aside>

    <div class="brand-header-center">
        <div class="brand-logo">S&U</div>
    </div>

    <div class="container">
        <div class="glass-card animate-fade-in">
            <h1>Choose your role</h1>
            <p class="subtitle">Are you a visionary startup or a strategic investor?</p>
            
            <div class="role-selection-grid">
                <a href="{{ url_for('dashboard_nextstartup') }}" class="btn-role-card">
                    <div class="role-icon"><i class="fa-solid fa-rocket"></i></div>
                    <div class="role-text">
                        <h3>Startup</h3>
                        <span>Create and grow your project</span>
                    </div>
                </a>

                <a href="{{ url_for('dashboard_investor') }}" class="btn-role-card">
                    <div class="role-icon"><i class="fa-solid fa-chart-line"></i></div>
                    <div class="role-text">
                        <h3>Investor</h3>
                        <span>Find promising opportunities</span>
                    </div>
                </a>
            </div>

            <div class="back-link-wrapper">
                <a href="{{ url_for('register_page') }}" class="btn-back">
                    <i class="fa-solid fa-arrow-left"></i> Back to registration
                </a>
            </div>
        </div>
    </div>

    <div class="status-bar-fixed">
        <div class="status-item">
            <span class="dot"></span> 
            <span class="label">LANGUAGE:</span> 
            <span class="value">ENGLISH</span>
        </div>
        <div class="status-separator"></div>
        <div class="status-item">
            <span class="label">STEP:</span> 
            <span class="value">03/08</span>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
