<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S&U - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="brand-logo">S&U</div>

    <div class="container">
        <div class="glass-card animate-fade-in">
            <h1>Login</h1>
            <p class="subtitle">Enter your details to continue</p>
            
            <form action="/login" method="POST">
    
    <div class="input-group">
        <input type="text" name="username" class="input-field" placeholder="Your Name" required>
    </div>

    <div class="input-group">
        <input type="email" name="email" class="input-field" placeholder="Email address" required>
    </div>

    <div class="input-group">
        <input type="password" name="password" class="input-field" placeholder="Password" required>
    </div>
    
    <button type="submit" class="btn-lang" style="width: 100%; cursor: pointer;">
        Log into account
        <span>Click to authorize</span>
    </button>
</form>

            <div style="margin-top: 20px;">
                <a href="/register" class="btn-back">Don't have an account? Register</a>
            </div>
        </div>
    </div>
</body>
</html>
