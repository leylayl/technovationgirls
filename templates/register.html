<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S&U - Registration</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="brand-logo">S&U</div>

    <div class="container">
        <div class="glass-card">
            <h1>Create Account</h1>
            <p style="opacity: 0.5; margin-bottom: 20px; font-size: 14px;">Join the startup ecosystem</p>
            
            <form action="/register" method="POST">
    
    <input type="text" name="username" class="input-field" placeholder="Full Name" required>
    
    <input type="email" name="email" class="input-field" placeholder="Email Address" required>
    <input type="password" name="password" class="input-field" placeholder="Password" required>
    <input type="password" name="confirm_password" class="input-field" placeholder="Confirm Password" required>
    
    <button type="submit" class="btn-main" style="width: 100%;">
        Register Now
    </button>
</form>
            <div style="margin-top: 20px;">
                <a href="/role" style="color: rgba(255,255,255,0.4); text-decoration: none; font-size: 13px;">
                    Already have an account? Login
                </a>
            </div>
        </div>
    </div>
</body>
</html>
